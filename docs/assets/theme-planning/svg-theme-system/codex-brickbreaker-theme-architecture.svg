    <path d="M 1106 258 L 1092 246 M 1106 258 L 1092 270" stroke="#f8f7ff" stroke-width="4" stroke-linecap="round"/>
  
  <rect x="72" y="396" width="394" height="118" rx="18" fill="#080816" stroke="#244c7a"/>
  <text x="96" y="434" fill="#00e5ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19" font-weight="700">Contrato humano-legível</text>
  <text x="96" y="468" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">spr-ball-player-default.svg → sprBallPlayerDefault</text>
  <text x="96" y="496" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">clr-neon-cyan-primary → --bb-clr-neon-cyan-primary</text>
  <rect x="524" y="396" width="394" height="118" rx="18" fill="#080816" stroke="#244c7a"/>
  <text x="548" y="434" fill="#ffe45e" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19" font-weight="700">Teste obrigatório</text>
  <text x="548" y="468" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">npm run test:asset-naming</text>
  <text x="548" y="496" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">npm run build + QA publicado quando virar feature</text>
  <rect x="976" y="396" width="360" height="118" rx="18" fill="#080816" stroke="#244c7a"/>
  <text x="1000" y="434" fill="#39ff88" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19" font-weight="700">Offline primeiro</text>
  <text x="1000" y="468" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">Sem CDN. Sem fontes remotas.</text>
  <text x="1000" y="496" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">Novos assets no cache lazy.</text>
</svg>
