<!-- docs/assets/theme-planning/svg-theme-system/codex-brickbreaker-theme-architecture.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo de seleção de tema e conjunto de imagens</title>
  <desc id="desc">Diagrama técnico para separar tema visual, catálogo de imagens e persistência local.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080816" />
      <stop offset="1" stop-color="#12122a" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1440" height="620" fill="url(#bg)"/>
  <rect x="32" y="32" width="1376" height="556" rx="28" fill="#0c1024" stroke="#244c7a" stroke-width="2"/>
  <text x="72" y="92" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="32" font-weight="700">Arquitetura proposta — tema + conjunto de imagens</text>
  <text x="72" y="126" fill="#9cb7d8" font-family="system-ui, sans-serif" font-size="18">Separar aparência, fontes e sprites para permitir escolha no menu sem quebrar o jogo offline.</text>
  
  <g filter="url(#glow)">
    <rect x="72" y="190" width="216" height="136" rx="20" fill="#12122a" stroke="#00e5ff" stroke-width="3"/>
    <text x="92" y="234" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" font-weight="700">Menu do jogador</text>
    <foreignObject x="92" y="250" width="176" height="56">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:16px system-ui,sans-serif;color:#9cb7d8;line-height:1.25">Escolhe tema visual e conjunto de imagens</div>
    </foreignObject>
  </g>
  <g filter="url(#glow)">
    <rect x="332" y="190" width="216" height="136" rx="20" fill="#12122a" stroke="#ff2bd6" stroke-width="3"/>
    <text x="352" y="234" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" font-weight="700">Preferência local</text>
    <foreignObject x="352" y="250" width="176" height="56">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:16px system-ui,sans-serif;color:#9cb7d8;line-height:1.25">themeId + imageSetId persistidos no aparelho</div>
    </foreignObject>
  </g>
  <g filter="url(#glow)">
    <rect x="592" y="190" width="216" height="136" rx="20" fill="#12122a" stroke="#ffe45e" stroke-width="3"/>
    <text x="612" y="234" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" font-weight="700">Catálogo de tema</text>
    <foreignObject x="612" y="250" width="176" height="56">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:16px system-ui,sans-serif;color:#9cb7d8;line-height:1.25">cores clr-* + tipografia typ-*</div>
    </foreignObject>
  </g>
  <g filter="url(#glow)">
    <rect x="852" y="190" width="216" height="136" rx="20" fill="#12122a" stroke="#39ff88" stroke-width="3"/>
    <text x="872" y="234" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" font-weight="700">Catálogo de imagens</text>
    <foreignObject x="872" y="250" width="176" height="56">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:16px system-ui,sans-serif;color:#9cb7d8;line-height:1.25">sprites spr-* + UI ui-* + VFX vfx-*</div>
    </foreignObject>
  </g>
  <g filter="url(#glow)">
    <rect x="1112" y="190" width="216" height="136" rx="20" fill="#12122a" stroke="#9b5cff" stroke-width="3"/>
    <text x="1132" y="234" fill="#f8f7ff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" font-weight="700">Aplicação em tela</text>
    <foreignObject x="1132" y="250" width="176" height="56">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font:16px system-ui,sans-serif;color:#9cb7d8;line-height:1.25">HUD, menu, canvas e efeitos sincronizados</div>
    </foreignObject>
  </g>
  
