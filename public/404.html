<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada — Brikaya</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --text: #d8f7ff;
        --muted: #8eb4c7;
        --accent: #00d4ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #10233d, var(--bg));
        color: var(--text);
      }

      main {
        max-width: 28rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Página não encontrada</h1>
      <p>O endereço que você abriu não existe ou não está mais disponível.</p>
      <p><a href="/">Voltar ao jogo</a></p>
    </main>
  </body>
</html>
