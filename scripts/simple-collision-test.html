<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Colisões - Brikaya</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00d4ff;
            margin: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #555;
        }
        .test-button {
            background: #00d4ff;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-family: inherit;
        }
        .test-button:hover {
            background: #00b8e6;
        }
        .test-button.danger {
            background: #ff4444;
        }
        .test-button.danger:hover {
            background: #ff6666;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .stat-item {
            background: #444;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Teste do Sistema de Colisões</h1>
        
        <div class="test-section">
            <h2>📊 Status do IndexedDB</h2>
            <div id="dbStatus">Verificando...</div>
            <button class="test-button" onclick="checkDBStatus()">Verificar Status</button>
        </div>
        
        <div class="test-section">
            <h2>🎮 Simular Colisões</h2>
            <button class="test-button" onclick="simulateWallCollision()">🧱 Colisão com Parede</button>
            <button class="test-button" onclick="simulatePaddleCollision()">🏓 Colisão com Raquete</button>
            <button class="test-button" onclick="simulateBrickCollision()">🧱 Colisão com Bloco</button>
            <button class="test-button" onclick="simulateCeilingCollision()">🏠 Colisão com Teto</button>
            <button class="test-button" onclick="simulateBallLost()">💀 Bola Perdida</button>
        </div>
        
        <div class="test-section">
            <h2>📈 Estatísticas</h2>
            <div id="stats" class="stats"></div>
            <button class="test-button" onclick="refreshStats()">Atualizar Estatísticas</button>
            <button class="test-button danger" onclick="clearAllCollisions()">Limpar Todas as Colisões</button>
        </div>
        
        <div class="test-section">
            <h2>📋 Colisões Recentes</h2>
            <div id="recentCollisions" class="log">Nenhuma colisão registrada</div>
            <button class="test-button" onclick="showRecentCollisions()">Mostrar Colisões Recentes</button>
        </div>
        
        <div class="test-section">
            <h2>🔍 Logs</h2>
            <div id="logs" class="log"></div>
            <button class="test-button" onclick="clearLogs()">Limpar Logs</button>
        </div>
    </div>

    <script>
        // Simular o collisionTracker
        class MockCollisionTracker {
            constructor() {
                this.db = null;
                this.DB_NAME = 'BrikayaCollisions';
                this.STORE_NAME = 'collisions';
                this.DB_VERSION = 1;
                this.init();
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);

                    request.onerror = () => {
                        log('❌ Erro ao abrir IndexedDB:', request.error);
                        reject(request.error);
                    };

                    request.onsuccess = () => {
                        this.db = request.result;
                        log('✅ IndexedDB inicializado para rastreamento de colisões');
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            const store = db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                            store.createIndex('type', 'type', { unique: false });
                            log('🏗️ Store de colisões criada no IndexedDB');
                        }
                    };
                });
            }

            async logCollision(event) {
                if (!this.db) {
                    log('⚠️ IndexedDB não inicializado, pulando registro de colisão');
                    return;
                }

                const collisionEvent = {
                    ...event,
                    id: this.generateId(),
                    timestamp: Date.now()
                };

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(this.STORE_NAME);
                    const request = store.add(collisionEvent);

                    request.onsuccess = () => {
                        log(`📊 Colisão registrada: ${collisionEvent.type} (ID: ${collisionEvent.id}) - Pos: (${Math.round(collisionEvent.ballPosition.x)}, ${Math.round(collisionEvent.ballPosition.y)})`);
                        resolve();
                    };

                    request.onerror = () => {
                        log('❌ Erro ao registrar colisão:', request.error);
                        reject(request.error);
                    };
                });
            }

            async getAllCollisions() {
                if (!this.db) {
                    log('⚠️ IndexedDB não inicializado');
                    return [];
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.STORE_NAME], 'readonly');
                    const store = transaction.objectStore(this.STORE_NAME);
                    const request = store.getAll();

                    request.onsuccess = () => {
                        const collisions = request.result.sort((a, b) => a.timestamp - b.timestamp);
                        log(`📊 Total de colisões recuperadas: ${collisions.length}`);
                        resolve(collisions);
                    };

                    request.onerror = () => {
                        log('❌ Erro ao recuperar colisões:', request.error);
                        reject(request.error);
                    };
                });
            }

            async clearAllCollisions() {
                if (!this.db) {
                    log('⚠️ IndexedDB não inicializado');
                    return;
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(this.STORE_NAME);
                    const request = store.clear();

                    request.onsuccess = () => {
                        log('🗑️ Todas as colisões foram removidas do IndexedDB');
                        resolve();
                    };

                    request.onerror = () => {
                        log('❌ Erro ao limpar colisões:', request.error);
                        reject(request.error);
                    };
                });
            }

            generateId() {
                return `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            }
        }

        const collisionTracker = new MockCollisionTracker();

        function log(message, ...args) {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            const logEntry = `[${timestamp}] ${message} ${args.join(' ')}\n`;
            logsDiv.textContent += logEntry;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function checkDBStatus() {
            const statusDiv = document.getElementById('dbStatus');
            if (collisionTracker.db) {
                statusDiv.innerHTML = `
                    ✅ IndexedDB conectado<br>
                    📊 Store: ${collisionTracker.STORE_NAME}<br>
                    🔢 Versão: ${collisionTracker.db.version}
                `;
            } else {
                statusDiv.innerHTML = '❌ IndexedDB não conectado';
            }
        }

        async function simulateWallCollision() {
            const gameState = { score: 100, ballsCount: 1, componentsRemaining: 50 };
            await collisionTracker.logCollision({
                type: 'wall',
                ballPosition: { x: 50, y: 150 },
                ballVelocity: { dx: -5, dy: 3 },
                gameState,
                targetInfo: { type: 'left' },
                metadata: { wallType: 'left' }
            });
            refreshStats();
        }

        async function simulatePaddleCollision() {
            const gameState = { score: 100, ballsCount: 1, componentsRemaining: 50 };
            await collisionTracker.logCollision({
                type: 'paddle',
                ballPosition: { x: 240, y: 280 },
                ballVelocity: { dx: 2, dy: 5 },
                gameState,
                targetInfo: {
                    type: 'paddle',
                    position: { x: 200, y: 290, width: 80, height: 10 }
                },
                metadata: { hitPosition: 0.5 }
            });
            refreshStats();
        }

        async function simulateBrickCollision() {
            const gameState = { score: 100, ballsCount: 1, componentsRemaining: 50 };
            await collisionTracker.logCollision({
                type: 'component',
                ballPosition: { x: 120, y: 80 },
                ballVelocity: { dx: 3, dy: -4 },
                gameState,
                targetInfo: {
                    type: 'component',
                    position: { x: 100, y: 60, width: 40, height: 20 },
                    componentIndex: { col: 2, row: 1 }
                },
                metadata: { componentColorIndex: 0 }
            });
            refreshStats();
        }

        async function simulateCeilingCollision() {
            const gameState = { score: 100, ballsCount: 1, componentsRemaining: 50 };
            await collisionTracker.logCollision({
                type: 'ceiling',
                ballPosition: { x: 200, y: 20 },
                ballVelocity: { dx: 1, dy: -3 },
                gameState,
                targetInfo: { type: 'ceiling' }
            });
            refreshStats();
        }

        async function simulateBallLost() {
            const gameState = { score: 100, ballsCount: 1, componentsRemaining: 50 };
            await collisionTracker.logCollision({
                type: 'ball_lost',
                ballPosition: { x: 150, y: 320 },
                ballVelocity: { dx: 0, dy: 5 },
                gameState,
                targetInfo: {
                    type: 'paddle',
                    position: { x: 200, y: 290, width: 80, height: 10 }
                },
                metadata: { reason: 'ball_passed_paddle' }
            });
            refreshStats();
        }

        async function refreshStats() {
            try {
                const collisions = await collisionTracker.getAllCollisions();
                const byType = collisions.reduce((acc, collision) => {
                    acc[collision.type] = (acc[collision.type] || 0) + 1;
                    return acc;
                }, {});

                const statsDiv = document.getElementById('stats');
                statsDiv.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${collisions.length}</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${byType.wall || 0}</div>
                        <div class="stat-label">Paredes</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${byType.paddle || 0}</div>
                        <div class="stat-label">Raquetes</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${byType.component || 0}</div>
                        <div class="stat-label">Blocos</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${byType.ceiling || 0}</div>
                        <div class="stat-label">Teto</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${byType.ball_lost || 0}</div>
                        <div class="stat-label">Perdidas</div>
                    </div>
                `;
            } catch (error) {
                log('❌ Erro ao atualizar estatísticas:', error);
            }
        }

        async function showRecentCollisions() {
            try {
                const collisions = await collisionTracker.getAllCollisions();
                const recent = collisions.slice(-10);
                
                const recentDiv = document.getElementById('recentCollisions');
                if (recent.length === 0) {
                    recentDiv.textContent = 'Nenhuma colisão registrada';
                    return;
                }

                const recentText = recent.map(c => {
                    const time = new Date(c.timestamp).toLocaleTimeString('pt-BR');
                    const pos = `(${Math.round(c.ballPosition.x)}, ${Math.round(c.ballPosition.y)})`;
                    return `${time} - ${c.type.toUpperCase()} - ${pos}`;
                }).join('\n');

                recentDiv.textContent = recentText;
            } catch (error) {
                log('❌ Erro ao mostrar colisões recentes:', error);
            }
        }

        async function clearAllCollisions() {
            try {
                await collisionTracker.clearAllCollisions();
                refreshStats();
                showRecentCollisions();
            } catch (error) {
                log('❌ Erro ao limpar colisões:', error);
            }
        }

        function clearLogs() {
            document.getElementById('logs').textContent = '';
        }

        // Inicializar
        window.onload = () => {
            checkDBStatus();
            refreshStats();
            log('🧪 Teste de colisões iniciado');
        };
    </script>
</body>
</html>
