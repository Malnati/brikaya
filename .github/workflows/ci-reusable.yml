# .github/workflows/ci-reusable.yml
name: ci-reusable

on:
  workflow_call:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm

      - name: Install dependencies
        run: |
          npm config set fetch-retries 3
          npm config set fetch-timeout 120000
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Materialize CI env
        run: node scripts/materialize-ci-env.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build
        run: npm run build

      - name: Verify build version label
        run: npm run verify:build-version

      - name: Test
        run: npm test

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xdg-utils

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Start local preview for e2e
        run: |
          npm run preview -- --host 127.0.0.1 --port 7979 &
          timeout 90 bash -c 'until curl -sf http://127.0.0.1:7979/ >/dev/null; do sleep 2; done'

      - name: Run cloudflare e2e suite
        run: npm run test:cloudflare-e2e
        env:
          BRIKAYA_PUBLIC_URL: http://127.0.0.1:7979/
          BRIKAYA_E2E_ONLY: tests/e2e/cloudflare-theme-qa.js
