# .github/workflows/deploy-production.yml
name: deploy-production

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

jobs:
  deploy-production:
    name: deploy-production
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: |
          npm install
          npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Materialize CI env
        run: node scripts/materialize-ci-env.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BRIKAYA_CLOUDFLARE_PAGES_PROJECT_NAME: brikaya-live
          BRIKAYA_CLOUDFLARE_PAGES_BRANCH: main
          BRIKAYA_CLOUDFLARE_PAGES_CUSTOM_DOMAIN: brikaya.com

      - name: Build static output
        run: npm run build

      - name: Ensure production Pages project
        run: node scripts/cloudflare-pages.js ensure-project

      - name: Deploy production
        run: node scripts/cloudflare-pages.js deploy

      - name: Ensure production domain and DNS
        run: |
          node scripts/cloudflare-pages.js ensure-domain
          node scripts/cloudflare-pages.js ensure-dns

      - name: Ensure pages.dev redirect to canonical domain
        run: node scripts/cloudflare-pages.js ensure-pages-dev-redirect

      - name: Purge public cache
        run: node scripts/cloudflare-pages.js purge-public-cache

      - name: Verify public index
        run: node scripts/cloudflare-pages.js verify-public-index

      - name: Trace guard public check
        run: npm run test:trace-guard:public
