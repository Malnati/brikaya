# .github/workflows/deploy-preview.yml
name: deploy-preview

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit

  deploy-preview:
    name: deploy-preview
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm

      - name: Install dependencies
        run: |
          npm config set fetch-retries 3
          npm config set fetch-timeout 120000
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Materialize CI env
        run: node scripts/materialize-ci-env.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BRIKAYA_CLOUDFLARE_PAGES_PREVIEW_PROJECT_NAME: brikaya-dev
          BRIKAYA_CLOUDFLARE_PAGES_PREVIEW_DOMAIN: dev.brikaya.com
          BRIKAYA_CLOUDFLARE_PAGES_PREVIEW_BRANCH: preview

      - name: Build static output
        run: npm run build

      - name: Ensure preview Pages project
        run: node scripts/cloudflare-pages.js ensure-preview-project

      - name: Deploy preview
        run: node scripts/cloudflare-pages.js deploy-preview

      - name: Ensure preview domain and DNS
        run: |
          node scripts/cloudflare-pages.js ensure-preview-domain
          node scripts/cloudflare-pages.js ensure-preview-dns

      - name: Verify preview index
        run: node scripts/cloudflare-pages.js verify-preview-index

      - name: Install Chrome for E2E
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: E2E mobile journey (preview)
        env:
          BRIKAYA_PUBLIC_URL: https://dev.brikaya.com/
          BRIKAYA_CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
        run: npm run test:cloudflare-mobile-journey
